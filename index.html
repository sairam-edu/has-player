<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HLS Video Player</title>
  
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #123047;
      --muted: #5f7181;
      --accent: #0e7a86;
      --border: #d7e2ea;
    }
 
    * { box-sizing: border-box; }
 
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef5fb 0%, #f8fbfd 100%);
      color: var(--text);
    }
 
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
 
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(18, 48, 71, 0.08);
    }
 
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 16px; color: var(--muted); line-height: 1.5; }
 
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
 
    .field { flex: 1 1 420px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
 
    input, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
    }
 
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
 
    .button-field {
      flex: 0 0 180px;
      align-self: end;
    }
 
    .video-container {
      margin-top: 16px;
      border-radius: 16px;
      background: #000;
      --plyr-color-main: var(--accent);
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>HLS Quality Demo</h1>
    <p>This version includes the bug fix to ensure switching back to "Auto" mode from a manual selection works flawlessly.</p>
 
    <div class="row">
      <div class="field">
        <label for="manifestUrl">HLS master manifest URL</label>
        <input id="manifestUrl" type="text" placeholder="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" />
      </div>
      <div class="button-field">
        <label>&nbsp;</label>
        <button id="loadButton" type="button">Load Stream</button>
      </div>
    </div>
 
    <div class="video-container">
      <video id="video" controls playsinline></video>
    </div>
    
    <div class="status" id="status">Idle</div>
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
    const manifestUrlInput = document.getElementById("manifestUrl");
    const loadButton = document.getElementById("loadButton");
    const video = document.getElementById("video");
    const status = document.getElementById("status");
 
    const params = new URLSearchParams(window.location.search);
    if (params.get("src")) {
      manifestUrlInput.value = params.get("src");
    }
 
    let hls = null;
    let player = null; 
 
    function setStatus(message) {
      status.textContent = message;
    }
 
    function destroyPlayer() {
      if (player) {
        player.destroy();
        player = null;
      }
      if (hls) {
        hls.destroy();
        hls = null;
      }
      video.removeAttribute("src");
      video.load();
    }

    function updateAutoLabel(height) {
      if (!player || !hls) return;
      
      const isAuto = hls.autoLevelEnabled;
      const newText = (isAuto && height) ? `Auto (${height}p)` : 'Auto';
      
      const autoOptionSpan = document.querySelector('.plyr__control[data-plyr="quality"][value="0"] span');
      if (autoOptionSpan) {
        autoOptionSpan.textContent = newText;
      }
      
      if (isAuto) {
        const qualityMenuValue = document.querySelector('.plyr__control--forward[data-plyr="quality"] .plyr__menu__value');
        if (qualityMenuValue) {
          qualityMenuValue.textContent = newText;
        }
      }
    }
 
    function updateQuality(newQuality) {
      if (!hls) return;
      
      // FIX: Force the incoming value to act as a Number so the strict check doesn't fail
      const qualityNumber = Number(newQuality);
      
      if (qualityNumber === 0) {
        hls.currentLevel = -1; 
        setStatus("Switched to Auto quality.");
        updateAutoLabel(null); 
      } else {
        hls.levels.forEach((level, levelIndex) => {
          if (level.height === qualityNumber) {
            hls.currentLevel = levelIndex;
            setStatus(`Requested ${qualityNumber}p quality.`);
          }
        });
        updateAutoLabel(null); 
      }
    }

    const plyrControls = [
      'play-large', 'play', 'progress', 'current-time', 
      'mute', 'volume', 'settings', 'pip', 'fullscreen' 
    ];

    function loadWithHlsJs(url) {
      hls = new Hls({
        capLevelToPlayerSize: false,
        startLevel: -1
      });
 
      hls.loadSource(url);
      hls.attachMedia(video);
 
      hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
        const availableQualities = hls.levels.map(l => l.height);
        availableQualities.unshift(0); 

        player = new Plyr(video, {
          controls: plyrControls,
          settings: ['quality'],
          quality: {
            default: 0, 
            options: availableQualities,
            forced: true,
            onChange: (e) => updateQuality(e)
          },
          i18n: { qualityLabel: { 0: 'Auto' } },
          fullscreen: { iosNative: true }
        });

        setStatus(`Loaded manifest with ${data.levels.length} quality levels.`);
        video.play().catch(() => {});
      });
 
      hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
        const current = data.level;
        const levelInfo = hls.levels[current];
        const label = current >= 0 && levelInfo ? `${levelInfo.height}p` : "Auto";
        
        setStatus(`Current playback quality: ${label}`);
        
        if (levelInfo) {
          updateAutoLabel(levelInfo.height);
        }
      });
 
      hls.on(Hls.Events.ERROR, (_, data) => {
        setStatus(`HLS error: ${data.type} / ${data.details}`);
      });
    }
 
    function loadStream() {
      const url = manifestUrlInput.value.trim();
      if (!url) {
        setStatus("Enter a master manifest URL first.");
        return;
      }
 
      destroyPlayer();

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                    (navigator.userAgent.includes("Mac") && "ontouchend" in document);
 
      if (window.Hls && Hls.isSupported() && !isIOS) {
        loadWithHlsJs(url);
        return;
      }
 
      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        
        player = new Plyr(video, { 
            controls: plyrControls,
            fullscreen: { iosNative: true }
        }); 

        video.addEventListener("loadedmetadata", () => {
          setStatus("Loaded with Apple native playback. Quality is fully automated by OS.");
        }, { once: true });
        video.play().catch(() => {});
        return;
      }
 
      setStatus("This browser cannot play HLS in this test page.");
    }
 
    loadButton.addEventListener("click", loadStream);
 
    if (manifestUrlInput.value) {
      loadStream();
    }
</script>
</body>
</html>
