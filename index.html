<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HLS Quality Demo (Inside Player)</title>
  
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #123047;
      --muted: #5f7181;
      --accent: #0e7a86;
      --border: #d7e2ea;
    }
 
    * { box-sizing: border-box; }
 
    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef5fb 0%, #f8fbfd 100%);
      color: var(--text);
    }
 
    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
 
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(18, 48, 71, 0.08);
    }
 
    h1 { margin: 0 0 8px; font-size: 28px; }
    p { margin: 0 0 16px; color: var(--muted); line-height: 1.5; }
 
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
 
    .field { flex: 1 1 420px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; }
 
    input, button {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px 14px;
      font-size: 14px;
      background: #fff;
    }
 
    button {
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 600;
    }
 
    .button-field {
      flex: 0 0 180px;
      align-self: end;
    }
 
    .video-container {
      margin-top: 16px;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      /* Fix for Plyr inheriting standard borders */
      --plyr-color-main: var(--accent);
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      color: var(--muted);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <h1>HLS Quality Demo</h1>
    <p>This demo uses <strong>Plyr</strong> to integrate the manual quality switching directly into the video player's settings menu, keeping it accessible in fullscreen.</p>
 
    <div class="row">
      <div class="field">
        <label for="manifestUrl">HLS master manifest URL</label>
        <input id="manifestUrl" type="text" placeholder="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" />
      </div>
      <div class="button-field">
        <label>&nbsp;</label>
        <button id="loadButton" type="button">Load Stream</button>
      </div>
    </div>
 
    <div class="video-container">
      <video id="video" controls playsinline></video>
    </div>
    
    <div class="status" id="status">Idle</div>
  </div>
</div>
 
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.18/dist/hls.min.js"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
    const manifestUrlInput = document.getElementById("manifestUrl");
    const loadButton = document.getElementById("loadButton");
    const video = document.getElementById("video");
    const status = document.getElementById("status");
 
    const params = new URLSearchParams(window.location.search);
    if (params.get("src")) {
      manifestUrlInput.value = params.get("src");
    }
 
    let hls = null;
    let player = null; // Plyr instance
 
    function setStatus(message) {
      status.textContent = message;
    }
 
    function destroyPlayer() {
      if (player) {
        player.destroy();
        player = null;
      }
      if (hls) {
        hls.destroy();
        hls = null;
      }
      video.removeAttribute("src");
      video.load();
    }
 
    function updateQuality(newQuality) {
      if (!hls) return;
      if (newQuality === 0) {
        hls.currentLevel = -1; // -1 is Auto in hls.js
        setStatus("Switched to Auto quality.");
      } else {
        // Find the index of the level that matches the selected height
        hls.levels.forEach((level, levelIndex) => {
          if (level.height === newQuality) {
            hls.currentLevel = levelIndex;
            setStatus(`Requested ${newQuality}p quality.`);
          }
        });
      }
    }

    function loadWithHlsJs(url) {
      hls = new Hls({
        capLevelToPlayerSize: false,
        startLevel: -1
      });
 
      hls.loadSource(url);
      hls.attachMedia(video);
 
      hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
        // 1. Extract available resolutions (heights) from the manifest
        const availableQualities = hls.levels.map(l => l.height);
        availableQualities.unshift(0); // Prepend 0 to represent 'Auto'

        // 2. Initialize Plyr and pass in our custom quality options
        player = new Plyr(video, {
          controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'fullscreen'],
          settings: ['quality'],
          quality: {
            default: 0, // Auto
            options: availableQualities,
            forced: true,
            onChange: (e) => updateQuality(e)
          },
          i18n: {
            qualityLabel: { 0: 'Auto' }
          }
        });

        setStatus(`Loaded manifest with ${data.levels.length} quality levels. Click the Gear icon ⚙️ in the player.`);
        video.play().catch(() => {});
      });
 
      hls.on(Hls.Events.LEVEL_SWITCHED, (_, data) => {
        const current = data.level;
        const label = current >= 0 && hls.levels[current] ? `${hls.levels[current].height}p` : "Auto";
        setStatus(`Current playback quality: ${label}`);
      });
 
      hls.on(Hls.Events.ERROR, (_, data) => {
        setStatus(`HLS error: ${data.type} / ${data.details}`);
      });
    }
 
    function loadStream() {
      const url = manifestUrlInput.value.trim();
      if (!url) {
        setStatus("Enter a master manifest URL first.");
        return;
      }
 
      destroyPlayer();
 
      if (window.Hls && Hls.isSupported()) {
        loadWithHlsJs(url);
        return;
      }
 
      // Fallback for native HLS (like Safari on iOS) where manual selection isn't allowed via JS
      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        player = new Plyr(video); // Init basic Plyr without custom quality configs
        video.addEventListener("loadedmetadata", () => {
          setStatus("Loaded with native HLS playback. Quality is managed automatically by your browser.");
        }, { once: true });
        video.play().catch(() => {});
        return;
      }
 
      setStatus("This browser cannot play HLS in this test page.");
    }
 
    loadButton.addEventListener("click", loadStream);
 
    if (manifestUrlInput.value) {
      loadStream();
    }
</script>
</body>
</html>
